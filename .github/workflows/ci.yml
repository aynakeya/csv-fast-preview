name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2025-vs2026]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run checks
        run: cargo check --all-targets

      - name: Run tests
        run: cargo test --all-targets --quiet

  build-release:
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2025-vs2026]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --bin csvfastview

      - name: Package release binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME//\//-}"
          asset="csvfastview-${tag}-${RUNNER_OS}-${RUNNER_ARCH}.tar.gz"

          mkdir -p dist package
          cp target/release/csvfastview package/
          cp README.md package/
          tar -czf "dist/${asset}" -C package .

      - name: Package release binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME.Replace('/', '-')
          $asset = "csvfastview-$tag-$env:RUNNER_OS-$env:RUNNER_ARCH.zip"

          New-Item -ItemType Directory -Force dist, package | Out-Null
          Copy-Item target\release\csvfastview.exe package\
          Copy-Item README.md package\
          Compress-Archive -Path package\* -DestinationPath "dist\$asset" -Force

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ runner.os }}-${{ runner.arch }}
          path: dist/*
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
